name: Update game manifests

on:
  schedule:
    - cron: "0 */2 * * *" # Every 2 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-scripts-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Create generated folder
        run: mkdir -p scripts/generated

      - name: Move to generated
        run: |
          mv hkrpg_global.json nap_global.json scripts/generated/

      - name: Run all scripts
        run: |
          echo "Current working directory: $(pwd)"
          echo "Scripts to run:"
          ls -lh $(pwd)/scripts/*.py
          for script in $(pwd)/scripts/*.py; do
            echo "======================================"
            echo "Running script: $script"
            echo "--------------------------------------"
            uv run "$script"
            status=$?
            if [ $status -eq 0 ]; then
              echo "Script $script completed successfully."
            else
              echo "Script $script failed with exit code $status."
            fi
            echo "======================================"
            echo
          done

      - name: Move generated JSONs to root
        run: |
          mv $(pwd)/scripts/generated/*.json $(pwd)/

      - name: Direct push safe manifests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add hkrpg_global.json nap_global.json
          if git diff --cached --quiet; then
            echo "" >> $GITHUB_OUTPUT
          else
            git commit -m "Automated: Update safe manifests"
            git push origin main
            git fetch origin main
          fi

      - name: Check for changes
        id: git-diff
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $(pwd)/*.json
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Automated: Update game manifests"
          branch: "game-manifests/auto-update"
          base: main
          title: "Automated: Update game manifests"
          body: "Review this PR to merge updated game manifests."
